services:
  - type: web
    name: resume-parser-portal
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEYS
        sync: false
    disk:
      name: resume-data
      mountPath: /opt/render/project/src
      sizeGB: 1
