services:
  resume-app:
    build: .
    ports:
      - "8001:8001"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-southeast-2}
    volumes:
      - ./linkedin_pdfs:/app/linkedin_pdfs
      - ./output:/app/output
      - ./manual_text:/app/manual_text
      - ./photos:/app/photos
      - ./resume_index.faiss:/app/resume_index.faiss
      - ./resume_metadata.json:/app/resume_metadata.json
    restart: unless-stopped
